<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velizman Kuaför</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-black text-white m-0 p-0 antialiased">
    <div id="root"></div>
    <script type="text/babel">
        // İkonların hatasız parlamasını sağlayan hafif yönlendiriciler
        const Scissors = () => <i className="fas fa-scissors text-amber-500"></i>;
        const Calendar = () => <i className="far fa-calendar-alt"></i>;
        const Clock = () => <i className="far fa-clock"></i>;
        const User = () => <i className="far fa-user"></i>;
        const Phone = () => <i className="fas fa-phone-alt"></i>;
        const CheckCircle = () => <i className="far fa-check-circle"></i>;
        const Lock = () => <i className="fas fa-lock"></i>;
        const Edit = () => <i className="far fa-edit"></i>;
        const ChevronLeft = () => <i className="fas fa-chevron-left"></i>;
        const CalendarCheck2 = () => <i className="fas fa-calendar-check"></i>;
        const MessageCircle = () => <i className="fab fa-whatsapp"></i>;
        const Wallet = () => <i className="fas fa-wallet text-amber-500"></i>;
        const TrendingUp = () => <i className="fas fa-chart-line text-amber-500"></i>;
        const DollarSign = () => <i className="fas fa-lira-sign"></i>;

        // === ANA UYGULAMA MEKANİZMASI ===
        function VelizmanApp() {
            const [view, setView] = React.useState('customer');
            const [selectedDate, setSelectedDate] = React.useState('');
            const [selectedTime, setSelectedTime] = React.useState('');
            const [selectedServices, setSelectedServices] = React.useState([]);
            const [name, setName] = React.useState('');
            const [phone, setPhone] = React.useState('');
            const [lastBookedAppointment, setLastBookedAppointment] = React.useState(null);
            const [isSaving, setIsSaving] = React.useState(false);
            const [saveSuccess, setSaveSuccess] = React.useState(false);
            
            const [appointments, setAppointments] = React.useState([
                { id: '1', date: '2026-05-23', time: '13:00', services: ['sac_yikama'], name: 'ali veli', phone: '123' }
            ]);
            
            const [prices, setPrices] = React.useState({
                'sac': 600, 'sakal': 300, 'cilt': 400, 'yikama': 50, 'sac_sakal_yikama': 850, 'sac_yikama': 650
            });
            const [editPrices, setEditPrices] = React.useState({
                'sac': 600, 'sakal': 300, 'cilt': 400, 'yikama': 50, 'sac_sakal_yikama': 850, 'sac_yikama': 650
            });
            
            const [adminLogin, setAdminLogin] = React.useState({ username: '', password: '' });
            const [isAdminLoggedIn, setIsAdminLoggedIn] = React.useState(false);
            const [errorMessage, setErrorMessage] = React.useState('');

            const SERVICES = [
                { id: 'sac', label: 'Saç Tıraşı', price: prices.sac },
                { id: 'sakal', label: 'Sakal Tıraşı', price: prices.sakal },
                { id: 'cilt', label: 'Cilt Bakımı', price: prices.cilt },
                { id: 'yikama', label: 'Yıkama', price: prices.yikama },
                { id: 'sac_sakal_yikama', label: 'Saç + Sakal + Yıkama', price: prices.sac_sakal_yikama },
                { id: 'sac_yikama', label: 'Saç + Yıkama', price: prices.sac_yikama }
            ];

            const getNext7Days = () => {
                const days = [];
                const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
                for (let i = 0; i < 7; i++) {
                    const d = new Date();
                    d.setDate(d.getDate() + i);
                    days.push({
                        dateStr: d.toISOString().split('T')[0],
                        label: d.toLocaleDateString('tr-TR', options)
                    });
                }
                return days;
            };

            const generateTimeSlots = () => {
                const slots = [];
                for (let h = 9; h <= 20; h++) {
                    slots.push(`${String(h).padStart(2, '0')}:00`);
                    if (h !== 20) slots.push(`${String(h).padStart(2, '0')}:30`);
                }
                return slots;
            };

            const handleServiceToggle = (id) => {
                if (id === 'sac_sakal_yikama' || id === 'sac_yikama') {
                    setSelectedServices([id]);
                } else {
                    const filtered = selectedServices.filter(s => s !== 'sac_sakal_yikama' && s !== 'sac_yikama');
                    if (filtered.includes(id)) {
                        setSelectedServices(filtered.filter(s => s !== id));
                    } else {
                        setSelectedServices([...filtered, id]);
                    }
                }
            };

            const handlePriceChange = (id, value) => {
                setEditPrices({ ...editPrices, [id]: Number(value) });
            };

            const handleSavePrices = () => {
                setIsSaving(true);
                setTimeout(() => {
                    setPrices({ ...editPrices });
                    setIsSaving(false);
                    setSaveSuccess(true);
                    setTimeout(() => setSaveSuccess(false), 2500);
                }, 800);
            };

            const handleBook = (e) => {
                e.preventDefault();
                if (!selectedDate || !selectedTime || selectedServices.length === 0 || !name || !phone) {
                    setErrorMessage('Lütfen tüm alanları eksiksiz doldurunuz.');
                    return;
                }
                const dayAppsCount = appointments.filter(app => app.date === selectedDate).length;
                if (dayAppsCount >= 10) {
                    setErrorMessage('Seçtiğiniz gün için maksimum randevu kapasitesine ulaşılmıştır. Lütfen başka bir gün seçin.');
                    return;
                }
                const newApp = {
                    id: Date.now().toString(),
                    date: selectedDate,
                    time: selectedTime,
                    services: selectedServices,
                    name,
                    phone
                };
                setAppointments([...appointments, newApp]);
                setLastBookedAppointment(newApp);
                setView('booking_success');
                
                setSelectedDate('');
                setSelectedTime('');
                setSelectedServices([]);
                setName('');
                setPhone('');
                setErrorMessage('');
            };

            const totalCapacityPercentage = (dateStr) => {
                const count = appointments.filter(app => app.date === dateStr).length;
                return Math.min(count * 10, 100);
            };

            const handleAdminLoginSubmit = (e) => {
                e.preventDefault();
                if (adminLogin.username === 'admin' && adminLogin.password === 'velizman123') {
                    setIsAdminLoggedIn(true);
                    setView('admin_dashboard');
                    setErrorMessage('');
                } else {
                    setErrorMessage('Hatalı kullanıcı adı veya şifre.');
                }
            };

            const getAppointmentCost = (app) => {
                return app.services.reduce((total, sId) => total + (prices[sId] || 0), 0);
            };

            const getEarningsStats = () => {
                const now = new Date();
                let weeklyTotal = 0;
                let monthlyTotal = 0;

                const startOfWeek = new Date(now);
                const day = startOfWeek.getDay();
                const diff = startOfWeek.getDate() - day + (day === 0 ? -6 : 1);
                startOfWeek.setDate(diff);
                startOfWeek.setHours(0,0,0,0);

                const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);

                appointments.forEach(app => {
                    const appDate = new Date(app.date);
                    const cost = getAppointmentCost(app);
                    
                    if (appDate >= startOfWeek) weeklyTotal += cost;
                    if (appDate >= startOfMonth) monthlyTotal += cost;
                });

                return { weekly: weeklyTotal, monthly: monthlyTotal };
            };

            const stats = getEarningsStats();

            const sendWhatsAppNotification = () => {
                if (!lastBookedAppointment) return;
                const chosenServicesLabels = lastBookedAppointment.services
                    .map(sId => SERVICES.find(s => s.id === sId)?.label || sId)
                    .join(', ');
                
                const message = `Merhaba, Velizman Kuaför'den randevunuz oluşturuldu!\n\n👤 İsim: ${lastBookedAppointment.name}\n📅 Tarih: ${lastBookedAppointment.date}\n⏰ Saat: ${lastBookedAppointment.time}\n✂️ Hizmet: ${chosenServicesLabels}\n\nTeşekkür ederiz, sıhhatler dileriz!`;
                
                const encodedMessage = encodeURIComponent(message);
                window.open(`https://wa.me/90${lastBookedAppointment.phone}?text=${encodedMessage}`, '_blank');
            };

            return (
                <div className="min-h-screen bg-black text-white font-sans max-w-md mx-auto border-x border-amber-500/20 shadow-2xl flex flex-col pb-24">
                    <header className="p-6 text-center border-b border-amber-500/20 bg-neutral-950/50 sticky top-0 backdrop-blur-md z-10 flex flex-col items-center">
                        <div className="w-12 h-12 rounded-full border-2 border-amber-500 flex items-center justify-center mb-2 bg-black shadow-lg shadow-amber-500/10">
                            <Scissors />
                        </div>
                        <h1 className="text-2xl font-black tracking-wider text-amber-500 font-serif">VELİZMAN</h1>
                        <p className="text-xs text-neutral-400 tracking-widest mt-0.5">Erkek Kuaförü</p>
                        <p className="text-[10px] text-neutral-500 italic mt-1">Berber Coşkun Çulan</p>
                    </header>

                    <div className="flex-1 p-4 space-y-6">
                        {view === 'customer' && (
                            <div className="space-y-6">
                                <section className="bg-neutral-950/60 p-4 rounded-xl border border-amber-500/10">
                                    <div className="flex items-center gap-2 mb-3 border-b border-neutral-900 pb-2">
                                        <Scissors />
                                        <h2 className="text-sm font-bold tracking-wider text-amber-500 uppercase">Hizmetlerimiz</h2>
                                    </div>
                                    <div className="space-y-2">
                                        {SERVICES.map(service => (
                                            <div 
                                                key={service.id} 
                                                onClick={() => handleServiceToggle(service.id)}
                                                className={`flex items-center justify-between p-3 rounded-lg border transition-all cursor-pointer ${selectedServices.includes(service.id) ? 'bg-amber-500/10 border-amber-500 shadow-md shadow-amber-500/5' : 'bg-neutral-900/40 border-neutral-800 hover:border-neutral-700'}`}
                                            >
                                                <span className="text-sm">{service.label}</span>
                                                <span className="text-sm font-bold text-amber-500">{service.price} ₺</span>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <form onSubmit={handleBook} className="space-y-4">
                                    <section className="bg-neutral-950/60 p-4 rounded-xl border border-amber-500/10">
                                        <div className="flex items-center gap-2 mb-3 border-b border-neutral-900 pb-2">
                                            <Calendar />
                                            <h2 className="text-sm font-bold tracking-wider text-amber-500 uppercase">Tarih Seçin</h2>
                                        </div>
                                        <div className="space-y-2 max-h-48 overflow-y-auto pr-1">
                                            {getNext7Days().map(day => {
                                                const pct = totalCapacityPercentage(day.dateStr);
                                                const isFull = pct >= 100;
                                                return (
                                                    <div 
                                                        key={day.dateStr}
                                                        onClick={() => !isFull && setSelectedDate(day.dateStr)}
                                                        className={`p-3 rounded-lg border transition-all flex flex-col gap-1 ${isFull ? 'bg-neutral-900/20 border-red-950 opacity-40 cursor-not-allowed' : selectedDate === day.dateStr ? 'bg-amber-500/10 border-amber-500 shadow-md' : 'bg-neutral-900/40 border-neutral-800 hover:border-neutral-700 cursor-pointer'}`}
                                                    >
                                                        <div className="flex justify-between items-center">
                                                            <span className="text-xs font-medium">{day.label}</span>
                                                            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${isFull ? 'bg-red-500/20 text-red-400' : pct >= 70 ? 'bg-orange-500/20 text-orange-400' : 'bg-emerald-500/20 text-emerald-400'}`}>
                                                                {isFull ? '%100 (Dolu)' : `%${pct} Dolu`}
                                                            </span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </section>

                                    {selectedDate && (
                                        <section className="bg-neutral-950/60 p-4 rounded-xl border border-amber-500/10">
                                            <div className="flex items-center gap-2 mb-3 border-b border-neutral-900 pb-2">
                                                <Clock />
                                                <h2 className="text-sm font-bold tracking-wider text-amber-500 uppercase">Saat Seçin</h2>
                                            </div>
                                            <div className="grid grid-cols-4 gap-2">
                                                {generateTimeSlots().map(time => {
                                                    const isTaken = appointments.some(app => app.date === selectedDate && app.time === time);
                                                    return (
                                                        <button
                                                            key={time}
                                                            type="button"
                                                            disabled={isTaken}
                                                            onClick={() => setSelectedTime(time)}
                                                            className={`py-2 rounded text-xs font-bold border transition-all ${isTaken ? 'bg-neutral-900/20 border-neutral-950 text-neutral-600 line-through cursor-not-allowed' : selectedTime === time ? 'bg-amber-500 text-black border-amber-500 font-black' : 'bg-neutral-900/60 border-neutral-800 hover:border-neutral-700 text-neutral-300'}`}
                                                        >
                                                            {time}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </section>
                                    )}

                                    <section className="bg-neutral-950/60 p-4 rounded-xl border border-amber-500/10">
                                        <div className="flex items-center gap-2 mb-3 border-b border-neutral-900 pb-2">
                                            <User />
                                            <h2 className="text-sm font-bold tracking-wider text-amber-500 uppercase">Bilgileriniz</h2>
                                        </div>
                                        <div className="space-y-3">
                                            <div>
                                                <label className="text-[10px] text-neutral-400 uppercase tracking-wider block mb-1">Adınız Soyadınız</label>
                                                <input 
                                                    type="text" 
                                                    value={name}
                                                    onChange={(e) => setName(e.target.value)}
                                                    placeholder="Örn. Ahmet Yılmaz" 
                                                    className="w-full bg-neutral-900 border border-neutral-800 rounded-lg py-2 px-3 text-sm text-white focus:outline-none focus:border-amber-500"
                                                />
                                            </div>
                                            <div>
                                                <label className="text-[10px] text-neutral-400 uppercase tracking-wider block mb-1">Telefon Numaranız</label>
                                                <input 
                                                    type="tel" 
                                                    value={phone}
                                                    onChange={(e) => setPhone(e.target.value)}
                                                    placeholder="5xx xxx xx xx" 
                                                    className="w-full bg-neutral-900 border border-neutral-800 rounded-lg py-2 px-3 text-sm text-white focus:outline-none focus:border-amber-500"
                                                />
                                            </div>
                                        </div>
                                    </section>

                                    {errorMessage && <p className="text-red-400 text-xs text-center font-semibold bg-red-500/10 py-2 rounded-lg border border-red-500/20">{errorMessage}</p>}

                                    <button 
                                        type="submit"
                                        className="w-full bg-amber-500 hover:bg-amber-600 text-black font-black py-3.5 rounded-xl text-sm tracking-wider shadow-lg shadow-amber-500/10 transition-all uppercase flex items-center justify-center gap-2 cursor-pointer"
                                    >
                                        <CalendarCheck2 />
                                        Randevuyu Onayla
                                    </button>
                                </form>
                            </div>
                        )}

                        {view === 'booking_success' && lastBookedAppointment && (
                            <section className="bg-neutral-950/80 p-6 rounded-xl border border-amber-500/20 text-center space-y-6 my-12">
                                <div className="w-16 h-16 bg-amber-500/10 border border-amber-500 rounded-full flex items-center justify-center mx-auto text-amber-500 text-2xl animate-pulse">
                                    <CheckCircle />
                                </div>
                                <div className="space-y-2">
                                    <h2 className="text-xl font-bold tracking-wide text-amber-500">Randevunuz Alındı!</h2>
                                    <p className="text-xs text-neutral-400">Kayıt işleminiz başarıyla tamamlanmıştır. Detayları WhatsApp üzerinden iletebilirsiniz.</p>
                                </div>

                                <button 
                                    onClick={sendWhatsAppNotification}
                                    className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl text-sm tracking-wide shadow-lg flex items-center justify-center gap-2 cursor-pointer transition-all"
                                >
                                    <MessageCircle />
                                    WhatsApp'ta Paylaş / Bildir
                                </button>
                                
                                <button 
                                    onClick={() => setView('customer')}
                                    className="text-xs text-neutral-500 underline hover:text-neutral-300 block mx-auto"
                                >
                                    Yeni Randevu Ekranına Dön
                                </button>
                            </section>
                        )}

                        {view === 'admin_login' && !isAdminLoggedIn && (
                            <section className="bg-neutral-950/60 p-4 rounded-xl border border-amber-500/10 max-w-sm mx-auto mt-12">
                                <div className="flex items-center gap-2 mb-4 border-b border-neutral-900 pb-2">
                                    <Lock />
                                    <h2 className="text-sm font-bold tracking-wider text-amber-500 uppercase">Yönetici Girişi</h2>
                                </div>
                                <form onSubmit={handleAdminLoginSubmit} className="space-y-4">
                                    <div>
                                        <label className="text-[10px] text-neutral-400 uppercase tracking-wider block mb-1">Kullanıcı Adı</label>
                                        <input 
                                            type="text" 
                                            value={adminLogin.username}
                                            onChange={(e) => setAdminLogin({ ...adminLogin, username: e.target.value })}
                                            placeholder="admin"
                                            className="w-full bg-neutral-900 border border-neutral-800 rounded-lg py-2 px-3 text-sm text-white focus:outline-none focus:border-amber-500"
                                        />
                                    </div>
                                    <div>
                                        <label className="text-[10px] text-neutral-400 uppercase tracking-wider block mb-1">Şifre</label>
                                        <input 
                                            type="password" 
                                            value={adminLogin.password}
                                            onChange={(e) => setAdminLogin({ ...adminLogin, password: e.target.value })}
                                            placeholder="••••••••"
                                            className="w-full bg-neutral-900 border border-neutral-800 rounded-lg py-2 px-3 text-sm text-white focus:outline-none focus:border-amber-500"
                                        />
                                    </div>
                                    {errorMessage && <p className="text-red-400 text-xs font-semibold">{errorMessage}</p>}
                                    <button type="submit" className="w-full bg-amber-500 text-black font-bold py-2.5 rounded-lg text-sm transition-all cursor-pointer">Giriş Yap</button>
                                </form>
                            </section>
                        )}

                        {view === 'admin_dashboard' && isAdminLoggedIn && (
                            <div className="space-y-6">
                                {/* KAZANÇ PANELİ */}
                                <section className="grid grid-cols-2 gap-3">
                                    <div className="bg-neutral-950/80 p-4 rounded-xl border border-amber-500/10 flex flex-col gap-1">
                                        <div className="flex items-center gap-1.5 text-neutral-400 text-[10px] uppercase tracking-wider">
                                            <TrendingUp /> Haftalık Kazanç
                                        </div>
                                        <span className="text-lg font-black text-amber-500">{stats.weekly} ₺</span>
                                        <span className="text-[9px] text-neutral-500">Bu haftaki ciro</span>
                                    </div>
                                    <div className="bg-neutral-950/80 p-4 rounded-xl border border-amber-500/10 flex flex-col gap-1">
                                        <div className="flex items-center gap-1.5 text-neutral-400 text-[10px] uppercase tracking-wider">
                                            <Wallet /> Aylık Kazanç
                                        </div>
                                        <span className="text-lg font-black text-amber-500">{stats.monthly} ₺</span>
                                        <span className="text-[9px] text-neutral-500">Bu aydaki toplam ciro</span>
                                    </div>
                                </section>

                                <section className="bg-neutral-950/60 p-4 rounded-xl border border-amber-500/10">
                                    <div className="flex items-center gap-2 mb-4 border-b border-neutral-900 pb-2">
                                        <Edit />
                                        <h2 className="text-sm font-bold tracking-wider text-amber-500 uppercase">Fiyatları Güncelle</h2>
                                    </div>
                                    <div className="space-y-3">
                                        {SERVICES.map(service => (
                                            <div key={service.id} className="flex items-center justify-between gap-2">
                                                <span className="text-xs text-neutral-300">{service.label}</span>
                                                <div className="flex items-center gap-2">
                                                    <input 
                                                        type="number" 
                                                        defaultValue={service.price}
                                                        onChange={(e) => handlePriceChange(service.id, e.target.value)}
                                                        className="w-20 bg-neutral-900 border border-neutral-700 rounded-lg py-1.5 px-2 text-right text-white focus:outline-none focus:border-amber-500 font-mono text-xs"
                                                    />
                                                    <span className="text-xs text-amber-500 font-bold">₺</span>
                                                </div>
                                            </div>
                                        ))}
                                        <button 
                                            onClick={handleSavePrices}
                                            disabled={isSaving}
                                            className="w-full bg-amber-500 text-black font-bold py-3 rounded-xl text-xs mt-2 transition-all cursor-pointer flex items-center justify-center"
                                        >
                                            {isSaving ? 'Kaydediliyor...' : saveSuccess ? '✓ Başarıyla Kaydedildi!' : 'Fiyatları Güncelle'}
                                        </button>
                                    </div>
                                </section>

                                <section className="bg-neutral-950/60 p-4 rounded-xl border border-amber-500/10">
                                    <div className="flex items-center gap-2 mb-4 border-b border-neutral-900 pb-2">
                                        <Calendar />
                                        <h2 className="text-sm font-bold tracking-wider text-amber-500 uppercase">Randevu Listesi ({appointments.length})</h2>
                                    </div>
                                    <div className="space-y-3 max-h-80 overflow-y-auto pr-1">
                                        {appointments.map(app => (
                                            <div key={app.id} className="bg-neutral-900/50 p-3 rounded-lg border border-neutral-800 space-y-1.5">
                                                <div className="flex justify-between items-center border-b border-neutral-950 pb-1">
                                                    <span className="text-xs font-black text-amber-500">{app.name}</span>
                                                    <span className="text-[10px] font-mono bg-neutral-800 px-1.5 py-0.5 rounded text-neutral-300">{app.time}</span>
                                                </div>
                                                <div className="text-[10px] text-neutral-400 flex items-center gap-1 pt-0.5">
                                                    <Phone />
                                                    <span>{app.phone}</span>
                                                    <span className="text-neutral-600 mx-1">|</span>
                                                    <span>{app.date}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}
                    </div>

                    <footer className="mt-auto border-t border-amber-500/10 bg-neutral-950/80 p-2 fixed bottom-0 left-0 right-0 max-w-md mx-auto backdrop-blur-md flex justify-around text-neutral-400 z-20">
                        <button onClick={() => setView('customer')} className={`flex flex-col items-center gap-1 py-1 px-4 rounded-lg text-[10px] font-bold tracking-wider transition-all cursor-pointer ${view === 'customer' || view === 'booking_success' ? 'text-amber-500' : 'hover:text-neutral-200'}`}>
                            <Calendar /> Randevu Al
                        </button>
                        <button 
                            onClick={() => {
                                if(isAdminLoggedIn) { setView('admin_dashboard'); } 
                                else { setView('admin_login'); }
                            }} 
                            className={`flex flex-col items-center gap-1 py-1 px-4 rounded-lg text-[10px] font-bold tracking-wider transition-all cursor-pointer ${view.startsWith('admin') ? 'text-amber-500' : 'hover:text-neutral-200'}`}
                        >
                            <Lock /> {isAdminLoggedIn ? 'Panel' : 'Yönetici'}
                        </button>
                    </footer>
                </div>
            );
        }

        // Uygulamayı tarayıcı ekranına bağlayan köprü
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<VelizmanApp />);
    </script>
</body>
</html>
