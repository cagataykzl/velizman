<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velizman - Berber Randevu Sitem</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Sabit Hizmet Listesi
        const SERVICES = [
            { id: 'sac', label: 'Saç Tıraşı', price: 150 },
            { id: 'sakal', label: 'Sakal Tıraşı', price: 100 },
            { id: 'cilt', label: 'Cilt Bakımı', price: 200 },
            { id: 'yikama', label: 'Yıkama', price: 50 },
            { id: 'sac_sakal_yikama', label: 'Saç + Sakal + Yıkama', price: 250 }
        ];

        // Saat Dilimleri
        const TIME_SLOTS = [
            "09:00", "09:30", "10:00", "10:30", "11:00", "11:30", 
            "13:00", "13:30", "14:00", "14:30", "15:00", "15:30", 
            "16:00", "16:30", "17:00", "17:30", "18:00"
        ];

        function VelizmanApp() {
            const [view, setView] = useState('customer'); // customer, admin_login, admin_dashboard
            const [adminPassword, setAdminPassword] = useState('');
            const [appointments, setAppointments] = useState([]);
            
            // Müşteri Form State'leri
            const [selectedService, setSelectedService] = useState('sac');
            const [customerName, setCustomerName] = useState('');
            const [customerPhone, setCustomerPhone] = useState('');
            const [selectedDate, setSelectedDate] = useState('');
            const [selectedTime, setSelectedTime] = useState('');
            const [message, setMessage] = useState({ type: '', text: '' });

            // İlk açılışta yerel hafızadan randevuları yükle
            useEffect(() => {
                const saved = localStorage.getItem('velizman_appointments');
                if (saved) setAppointments(JSON.parse(saved));
            }, []);

            // Randevu Kaydetme Fonksiyonu
            const handleBook = (e) => {
                e.preventDefault();
                if (!customerName || !customerPhone || !selectedDate || !selectedTime) {
                    setMessage({ type: 'error', text: 'Lütfen tüm alanları doldurun!' });
                    return;
                }

                // Saat kontrolü (Aynı saatte başka randevu var mı?)
                const isBusy = appointments.some(app => app.date === selectedDate && app.time === selectedTime);
                if (isBusy) {
                    setMessage({ type: 'error', text: 'Seçtiğiniz saatte başka bir randevu bulunuyor!' });
                    return;
                }

                const newApp = {
                    id: Date.now(),
                    name: customerName,
                    phone: customerPhone,
                    service: SERVICES.find(s => s.id === selectedService)?.label,
                    price: SERVICES.find(s => s.id === selectedService)?.price,
                    date: selectedDate,
                    time: selectedTime
                };

                const updated = [...appointments, newApp];
                setAppointments(updated);
                localStorage.setItem('velizman_appointments', JSON.stringify(updated));

                setMessage({ type: 'success', text: `Randevunuz Başarıyla Alındı! Saat: ${selectedTime}` });
                setCustomerName('');
                setCustomerPhone('');
                setSelectedTime('');
            };

            // Admin Girişi
            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPassword === '1234') { // Geçici admin şifresi
                    setView('admin_dashboard');
                    setMessage({ type: '', text: '' });
                } else {
                    setMessage({ type: 'error', text: 'Hatalı şifre girdiyseniz lütfen tekrar deneyin.' });
                }
            };

            // Randevu Silme
            const handleDelete = (id) => {
                const updated = appointments.filter(app => app.id !== id);
                setAppointments(updated);
                localStorage.setItem('velizman_appointments', JSON.stringify(updated));
            };

            return (
                <div class="min-h-screen flex flex-col justify-between">
                    {/* Header */}
                    <header class="bg-stone-900 text-amber-500 p-5 shadow-md flex justify-between items-center">
                        <div>
                            <h1 class="text-3xl font-extrabold tracking-wider"><i class="fa-solid皮 fa-scissors mr-2"></i>VELİZMAN</h1>
                            <p class="text-xs text-stone-400 mt-1">Erkek Kuaförü & Berber Salonu</p>
                        </div>
                        {view === 'customer' ? (
                            <button onClick={() => setView('admin_login')} class="text-sm bg-stone-800 hover:bg-stone-700 text-stone-300 px-3 py-1.5 rounded transition">
                                <i class="fa-solid fa-lock mr-1"></i> Yönetici Girişi
                            </button>
                        ) : (
                            <button onClick={() => setView('customer')} class="text-sm bg-amber-600 hover:bg-amber-500 text-white px-3 py-1.5 rounded transition">
                                <i class="fa-solid fa-house mr-1"></i> Ana Sayfa
                            </button>
                        )}
                    </header>

                    {/* Main Content */}
                    <main class="flex-grow container mx-auto max-w-lg p-4 mt-4">
                        {message.text && (
                            <div class={`p-4 mb-4 rounded-xl text-center font-medium ${message.type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                                {message.text}
                            </div>
                        )}

                        {view === 'customer' && (
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                <h2 class="text-xl font-bold text-stone-800 mb-5 border-b pb-2 text-center">Online Randevu Oluştur</h2>
                                <form onSubmit={handleBook} class="space-y-4">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Adınız Soyadınız</label>
                                        <input type="text" value={customerName} onChange={e => setCustomerName(e.target.value)} class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-amber-500 outline-none" placeholder="Örn: Ahmet Yılmaz" />
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Telefon Numaranız</label>
                                        <input type="tel" value={customerPhone} onChange={e => setCustomerPhone(e.target.value)} class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-amber-500 outline-none" placeholder="0555 XXXXXXX" />
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Yapılacak İşlem</label>
                                        <select value={selectedService} onChange={e => setSelectedService(e.target.value)} class="w-full p-3 border rounded-xl bg-white outline-none focus:ring-2 focus:ring-amber-500">
                                            {SERVICES.map(s => <option key={s.id} value={s.id}>{s.label} ({s.price} TL)</option>)}
                                        </select>
                                    </div>
                                    <div class="grid grid-cols-2 gap-3">
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-1">Tarih</label>
                                            <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-amber-500" />
                                        </div>
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-1">Saat Seçin</label>
                                            <select value={selectedTime} onChange={e => setSelectedTime(e.target.value)} class="w-full p-3 border rounded-xl bg-white outline-none focus:ring-2 focus:ring-amber-500">
                                                <option value="">Seçiniz...</option>
                                                {TIME_SLOTS.map(t => (
                                                    <option key={t} value={t}>{t}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>
                                    <button type="submit" class="w-full bg-stone-900 hover:bg-stone-800 text-amber-500 font-bold p-3.5 rounded-xl mt-4 transition shadow-md">
                                        Randevuyu Onayla
                                    </button>
                                </form>
                            </div>
                        )}

                        {view === 'admin_login' && (
                            <div class="bg-white p-6 rounded-2xl shadow-sm max-w-sm mx-auto border mt-10">
                                <h2 class="text-xl font-bold text-center mb-4 text-stone-800">Yönetici Paneli Girişi</h2>
                                <form onSubmit={handleAdminLogin} class="space-y-4">
                                    <input type="password" value={adminPassword} onChange={e => setAdminPassword(e.target.value)} placeholder="Yönetici Şifresi (Varsayılan: 1234)" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-amber-500 text-center" />
                                    <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold p-3 rounded-xl transition">Giriş Yap</button>
                                </form>
                            </div>
                        )}

                        {view === 'admin_dashboard' && (
                            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                                <div class="flex justify-between items-center border-b pb-3 mb-4">
                                    <h2 class="text-xl font-bold text-stone-800">Gelen Randevular ({appointments.length})</h2>
                                    <button onClick={() => { if(confirm('Tüm verileri sıfırlamak istiyor musunuz?')) { setAppointments([]); localStorage.removeItem('velizman_appointments'); } }} class="text-xs text-red-500 hover:underline">Tümünü Temizle</button>
                                </div>
                                {appointments.length === 0 ? (
                                    <p class="text-gray-500 text-center py-6">Henüz kayıtlı randevu bulunmuyor.</p>
                                ) : (
                                    <div class="space-y-3">
                                        {appointments.map(app => (
                                            <div key={app.id} class="p-3 bg-gray-50 border rounded-xl flex justify-between items-center text-sm shadow-sm">
                                                <div>
                                                    <div class="font-bold text-stone-900">{app.name} <span class="text-xs font-normal text-gray-500">({app.phone})</span></div>
                                                    <div class="text-amber-700 font-medium mt-0.5">{app.service} - {app.price} TL</div>
                                                    <div class="text-xs text-gray-500 mt-1"><i class="fa-regular fa-calendar mr-1"></i>{app.date} | <i class="fa-regular fa-clock mr-1"></i>{app.time}</div>
                                                </div>
                                                <button onClick={() => handleDelete(app.id)} class="text-red-500 hover:bg-red-50 p-2 rounded-lg transition" title="Randevuyu Sil">
                                                    <i class="fa-solid fa-trash-can"></i>
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer class="bg-stone-900 text-stone-400 text-center py-4 text-xs mt-10 border-t border-stone-800">
                        &copy; 2026 VELİZMAN. Tüm Hakları Saklıdır. | Berberi Çoşkun Çulan
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<VelizmanApp />);
    </script>
</body>
</html>
