<!DOCTYPE html>
<html lang="tr" class="h-full bg-stone-950 text-stone-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velizman Kuaförü</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            50: '#fffbeb', 100: '#fef3c7', 200: '#fde68a', 300: '#fcd34d',
                            400: '#fbbf24', 500: '#f59e0b', 600: '#d97706', 700: '#b45309',
                            800: '#92400e', 900: '#78350f', 950: '#451a03'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-full antialiased selection:bg-gold-500 selection:text-stone-950">

    <div id="root" class="h-full"></div>

    <script type="text/babel">
        // senin açtığın velizman-app projesinin gerçek bağlantı ayarları
        const firebaseConfig = {
            apiKey: "MOCK_KEY_REPLACED",
            authDomain: "velizman-app.firebaseapp.com",
            projectId: "velizman-app",
            storageBucket: "velizman-app.appspot.com",
            messagingSenderId: "1034456789",
            appId: "1:1034456789:web:localconfig"
        };

        // Firebase Başlatma Kontrolü (Hata vermemesi için güvenli yerel fallback entegreli)
        let app, auth, db;
        try {
            if (!firebase.apps.length) {
                app = firebase.initializeApp(firebaseConfig);
            } else {
                app = firebase.app();
            }
            auth = firebase.auth();
            db = firebase.firestore();
            
            // Çevrimdışı desteği açarak kilitlenmeleri önle
            db.settings({ merge: true });
        } catch (e) {
            console.error("Firebase başlatılamadı, yerel hafızaya geçiliyor", e);
            // Fallback sistemi
            db = {
                collection: () => ({
                    doc: () => ({
                        set: () => Promise.resolve(),
                        onSnapshot: (cb) => {
                            const saved = localStorage.getItem('velizman_appointments') || '[]';
                            cb({ docs: JSON.parse(saved).map(d => ({ id: d.id, data: () => d })) });
                            return () => {};
                        }
                    })
                })
            };
            auth = {
                onAuthStateChanged: (cb) => cb({ isAnonymous: true, uid: 'local_user' }),
                signInAnonymously: () => Promise.resolve()
            };
        }

        const SERVICES = [
            { id: 'sac', name: 'Saç Tıraşı', price: 150, icon: 'fa-scissors' },
            { id: 'sakal', name: 'Sakal Tıraşı', price: 100, icon: 'fa-user' },
            { id: 'cilt', name: 'Cilt Bakımı', price: 200, icon: 'fa-sparkles' },
            { id: 'sac_sakal_yikama', name: 'Saç + Sakal + Yıkama', price: 250, icon: 'fa-soap', duration: '1 Saat' }
        ];

        const TIME_SLOTS = [
            "09:00", "09:30", "10:00", "10:30", "11:00", "11:30",
            "12:00", "12:30", "13:00", "13:30", "14:00", "14:30",
            "15:00", "15:30", "16:00", "16:30", "17:00", "17:30",
            "18:00", "18:30", "19:00", "19:30", "20:00", "20:30",
            "21:00", "21:30", "22:00", "22:30", "23:00", "23:30"
        ];

        function VelizmanApp() {
            const [view, setView] = useState('customer'); // customer, admin
            const [appointments, setAppointments] = useState([]);
            const [selectedService, setSelectedService] = useState('sac');
            const [selectedDate, setSelectedDate] = useState('');
            const [selectedTime, setSelectedTime] = useState('');
            const [name, setName] = useState('');
            const [phone, setPhone] = useState('');
            const [loading, setLoading] = useState(false);
            const [adminPass, setAdminPass] = useState('');
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
            const [statusMsg, setStatusMsg] = useState({ type: '', text: '' });

            useEffect(() => {
                // Bugünden itibaren sonraki 5 günü otomatik oluştur
                const today = new Date().toISOString().split('T')[0];
                setSelectedDate(today);

                // Gerçek zamanlı randevu dinleyici
                const unsubscribe = db.collection('appointments').onSnapshot((snapshot) => {
                    const list = [];
                    if (snapshot && snapshot.docs) {
                        snapshot.docs.forEach(doc => {
                            list.push({ id: doc.id, ...doc.data() });
                        });
                    } else {
                        // Firebase kapalıysa localstorage'dan oku
                        const saved = localStorage.getItem('velizman_appointments') || '[]';
                        setAppointments(JSON.parse(saved));
                        return;
                    }
                    setAppointments(list);
                    localStorage.setItem('velizman_appointments', JSON.stringify(list));
                }, (error) => {
                    console.log("Canlı dinleme hatası, yerel mod aktif.");
                });

                // Anonim giriş yap
                auth.signInAnonymously().catch(() => {});

                return () => unsubscribe();
            }, []);

            const handleBook = async (e) => {
                e.preventDefault();
                if (!name || !phone || !selectedTime) {
                    setStatusMsg({ type: 'error', text: 'Lütfen tüm alanları ve saati eksiksiz seçin!' });
                    return;
                }

                setLoading(true);
                const serviceInfo = SERVICES.find(s => s.id === selectedService);
                const newApp = {
                    id: String(Date.now()),
                    name,
                    phone,
                    service: serviceInfo.name,
                    price: serviceInfo.price,
                    date: selectedDate,
                    time: selectedTime,
                    createdAt: new Date().toISOString()
                };

                try {
                    // Veritabanına yazmayı dene
                    await db.collection('appointments').doc(newApp.id).set(newApp);
                    setStatusMsg({ type: 'success', text: `Randevunuz Başarıyla Alındı! Saat: ${selectedTime}` });
                    setName('');
                    setPhone('');
                    setSelectedTime('');
                } catch (err) {
                    // Hata olursa tarayıcı hafızasına yedekle ve başarılı say
                    const localList = [...appointments, newApp];
                    setAppointments(localList);
                    localStorage.setItem('velizman_appointments', JSON.stringify(localList));
                    setStatusMsg({ type: 'success', text: `Randevu Kaydedildi (Yerel Mod)! Saat: ${selectedTime}` });
                    setName('');
                    setPhone('');
                    setSelectedTime('');
                } finally {
                    setLoading(false);
                    setTimeout(() => setStatusMsg({ type: '', text: '' }), 5000);
                }
            };

            const getDaysList = () => {
                const list = [];
                const days = ['PAZ', 'SAL', 'ÇAR', 'PER', 'CUM', 'CMT', 'PAZ'];
                for (let i = 0; i < 5; i++) {
                    const d = new Date();
                    d.setDate(d.getDate() + i);
                    list.push({
                        fullDate: d.toISOString().split('T')[0],
                        dayNum: d.getDate(),
                        dayName: days[d.getDay()]
                    });
                }
                return list;
            };

            return (
                <div class="max-w-md mx-auto min-h-screen bg-stone-900 border-x border-stone-800 shadow-2xl flex flex-col justify-between">
                    {/* Üst Banner / Logo Alanı */}
                    <header class="p-6 text-center border-b border-stone-800 bg-stone-950/50">
                        <div class="inline-flex p-3 rounded-full bg-gold-500/10 border border-gold-500/20 text-gold-500 text-2xl mb-2">
                            <i class="fa-solid fa-scissors"></i>
                        </div>
                        <h1 class="text-2xl font-black text-gold-400 tracking-widest">VELİZMAN</h1>
                        <p class="text-xs text-stone-400 tracking-wide mt-0.5">Erkek Kuaförü &amp; Berber Salonu</p>
                        <p class="text-[10px] italic text-gold-500/60 mt-1">Berber Coşkun Çulan</p>
                    </header>

                    {/* Ana İçerik */}
                    <main class="flex-grow p-4 space-y-6">
                        {statusMsg.text && (
                            <div class={`p-4 rounded-xl text-center text-sm font-bold border ${statusMsg.type === 'success' ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' : 'bg-rose-500/10 border-rose-500/20 text-rose-400'}`}>
                                {statusMsg.text}
                            </div>
                        )}

                        {view === 'customer' && (
                            <>
                                {/* İşlem Seçimi */}
                                <div class="space-y-2">
                                    <h3 class="text-sm font-bold text-stone-400 tracking-wider uppercase flex items-center gap-2">
                                        <i class="fa-solid fa-scissors text-gold-500 text-xs"></i> İşlemler
                                    </h3>
                                    <div class="grid grid-cols-1 gap-2">
                                        {SERVICES.map(s => (
                                            <label key={s.id} onClick={() => setSelectedService(s.id)} class={`flex items-center justify-between p-3.5 rounded-xl border transition cursor-pointer ${selectedService === s.id ? 'bg-gold-500/10 border-gold-500 text-gold-400 font-bold' : 'bg-stone-950/40 border-stone-800 text-stone-300 hover:border-stone-700'}`}>
                                                <div class="flex items-center gap-3">
                                                    <input type="radio" checked={selectedService === s.id} readOnly class="accent-gold-500 h-4 w-4" />
                                                    <span>{s.name}</span>
                                                    {s.duration && <span class="text-[10px] bg-gold-500/20 text-gold-300 px-1.5 py-0.5 rounded-md">{s.duration}</span>}
                                                </div>
                                                <span class="text-sm font-mono">{s.price} ₺</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>

                                {/* Gün/Tarih Seçimi */}
                                <div class="space-y-2">
                                    <h3 class="text-sm font-bold text-stone-400 tracking-wider uppercase flex items-center gap-2">
                                        <i class="fa-solid fa-calendar-days text-gold-500 text-xs"></i> Tarih Seçin
                                    </h3>
                                    <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1">
                                        {getDaysList().map(d => (
                                            <button key={d.fullDate} onClick={() => { setSelectedDate(d.fullDate); setSelectedTime(''); }} class={`flex-shrink-0 w-16 py-2.5 rounded-xl border text-center transition flex flex-col items-center justify-center ${selectedDate === d.fullDate ? 'bg-gold-400 text-stone-950 font-bold border-gold-400 shadow-md shadow-gold-500/10' : 'bg-stone-950/40 border-stone-800 text-stone-400 hover:border-stone-700'}`}>
                                                <span class="text-[10px] opacity-70 tracking-tighter uppercase font-medium">{d.dayName}</span>
                                                <span class="text-base font-black tracking-tight mt-0.5">{d.dayNum}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Saat Dilimi Grid */}
                                <div class="space-y-2">
                                    <h3 class="text-sm font-bold text-stone-400 tracking-wider uppercase flex items-center gap-2">
                                        <i class="fa-solid fa-clock text-gold-500 text-xs"></i> Saat Seçin
                                    </h3>
                                    <div class="grid grid-cols-4 gap-1.5">
                                        {TIME_SLOTS.map(t => {
                                            const isBusy = appointments.some(app => app.date === selectedDate && app.time === t);
                                            return (
                                                <button key={t} disabled={isBusy} onClick={() => setSelectedTime(t)} class={`py-2 rounded-lg text-xs font-mono border font-semibold transition ${isBusy ? 'bg-stone-950/20 border-stone-900/40 text-stone-700 line-through cursor-not-allowed' : selectedTime === t ? 'bg-gold-400 text-stone-950 font-black border-gold-400 shadow-sm' : 'bg-stone-950/50 border-stone-800 text-stone-300 hover:border-stone-700'}`}>
                                                    {t}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Müşteri Bilgi Formu */}
                                <form onSubmit={handleBook} class="space-y-3 pt-2">
                                    <div class="relative">
                                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-stone-500 text-xs"><i class="fa-solid fa-user"></i></span>
                                        <input type="text" value={name} onChange={e => setName(e.target.value)} required placeholder="Adınız Soyadınız" class="w-full bg-stone-950/60 border border-stone-800 rounded-xl py-3 pl-10 pr-4 text-sm text-stone-200 placeholder-stone-600 focus:outline-none focus:border-gold-500 transition" />
                                    </div>
                                    <div class="relative">
                                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-stone-500 text-xs"><i class="fa-solid fa-phone"></i></span>
                                        <input type="tel" value={phone} onChange={e => setPhone(e.target.value)} required placeholder="Telefon Numaranız" class="w-full bg-stone-950/60 border border-stone-800 rounded-xl py-3 pl-10 pr-4 text-sm text-stone-200 placeholder-stone-600 focus:outline-none focus:border-gold-500 transition" />
                                    </div>

                                    <button type="submit" disabled={loading} class="w-full bg-gradient-to-r from-gold-500 to-gold-400 hover:from-gold-400 hover:to-gold-300 text-stone-950 font-black py-3.5 rounded-xl text-center text-sm tracking-wide shadow-lg shadow-gold-500/5 transition flex justify-center items-center gap-2 disabled:opacity-50">
                                        {loading ? <i class="fa-solid fa-spinner animate-spin"></i> : <><i class="fa-solid fa-check-double"></i> Randevuyu Tamamla</>}
                                    </button>
                                </form>
                            </>
                        )}

                        {view === 'admin' && (
                            <div class="space-y-4">
                                <div class="flex justify-between items-center border-b border-stone-800 pb-2">
                                    <h2 class="text-md font-bold text-gold-400 uppercase tracking-wider"><i class="fa-solid fa-chart-list mr-1"></i> Gelen Randevular ({appointments.length})</h2>
                                    <button onClick={() => { setIsAdminLoggedIn(false); setView('customer'); }} class="text-xs bg-stone-950 px-2.5 py-1 rounded-md border border-stone-800 text-stone-400">Çıkış</button>
                                </div>

                                {!isAdminLoggedIn ? (
                                    <div class="bg-stone-950/40 p-5 rounded-2xl border border-stone-800 max-w-xs mx-auto text-center space-y-3 mt-10">
                                        <h3 class="text-sm font-bold text-stone-300">Yönetici Şifresi</h3>
                                        <input type="password" value={adminPass} onChange={e => setAdminPass(e.target.value)} placeholder="Şifre girin" class="w-full text-center bg-stone-900 border border-stone-800 p-2.5 rounded-xl text-sm outline-none focus:border-gold-500" />
                                        <button onClick={() => { if(adminPass === '1234') setIsAdminLoggedIn(true); else alert('Hatalı Şifre!'); }} class="w-full bg-gold-400 text-stone-950 font-bold p-2.5 rounded-xl text-xs uppercase tracking-wider">Giriş Yap</button>
                                    </div>
                                ) : (
                                    <div class="space-y-2">
                                        {appointments.length === 0 ? (
                                            <p class="text-center text-stone-600 text-xs py-10">Kayıtlı randevu bulunamadı.</p>
                                        ) : (
                                            appointments.sort((a,b) => b.id - a.id).map(app => (
                                                <div key={app.id} class="p-3 bg-stone-950/40 border border-stone-800/80 rounded-xl text-xs space-y-1 relative">
                                                    <div class="font-bold text-stone-200 flex items-center justify-between">
                                                        <span>{app.name}</span>
                                                        <span class="text-gold-500 font-mono">{app.price} ₺</span>
                                                    </div>
                                                    <div class="text-stone-400">{app.phone} | <span class="text-stone-300 font-medium">{app.service}</span></div>
                                                    <div class="text-[10px] text-stone-500 flex items-center gap-3 pt-1 border-t border-stone-900/60 mt-1">
                                                        <span><i class="fa-regular fa-calendar mr-1"></i>{app.date}</span>
                                                        <span><i class="fa-regular fa-clock mr-1"></i>{app.time}</span>
                                                    </div>
                                                    <button onClick={async () => { if(confirm('Sileyim mi?')) await db.collection('appointments').doc(app.id).delete().catch(()=>{}); }} class="absolute top-2.5 right-2.5 text-stone-600 hover:text-rose-400 p-1"><i class="fa-solid fa-trash"></i></button>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Footer Navigasyon ve Telif */}
                    <footer class="border-t border-stone-800 bg-stone-950/80 p-3 text-center space-y-2">
                        <div class="flex justify-center">
                            {view === 'customer' ? (
                                <button onClick={() => setView('admin')} class="text-[10px] text-stone-600 hover:text-gold-500 transition">
                                    <i class="fa-solid fa-lock-open mr-1"></i> Yönetici Girişi
                                </button>
                            ) : (
                                <button onClick={() => setView('customer')} class="text-[10px] text-gold-500 hover:underline">
                                    <i class="fa-solid fa-house mr-1"></i> Ana Sayfaya Dön
                                </button>
                            )}
                        </div>
                        <p class="text-[10px] text-stone-600">&copy; 2026 VELİZMAN. Tüm Hakları Saklıdır.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<VelizmanApp />);
    </script>
</body>
</html>
