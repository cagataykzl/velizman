<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velizman Kuaförü</title>
    <!-- Tailwind CSS (Kurulumsuz CDN versiyonu) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        .zoom-in { animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* AÇIK TEMA (LIGHT) RENK PALETİ OVERRIDE */
        [data-theme="light"] {
            --c-bg: #F8F9FA;          
            --c-container: #FFFFFF;   
            --c-el: #F3F4F6;          
            --c-el-hover: #E5E7EB;    
            --c-text-main: #111827;   
            --c-text-sec: #374151;    
            --c-text-muted: #6B7280;  
            --c-text-faint: #9CA3AF;  
            --c-border: #E5E7EB;      
            --c-accent: #D97706;      
            --c-accent-hover: #B45309;
            --c-accent-text: #FFFFFF; 
        }
        body[data-theme="light"] { background-color: var(--c-bg) !important; color: var(--c-text-main) !important; }
        [data-theme="light"] .bg-neutral-900 { background-color: var(--c-bg) !important; }
        [data-theme="light"] .bg-neutral-950 { background-color: var(--c-container) !important; }
        [data-theme="light"] .bg-neutral-950\/40 { background-color: rgba(255,255,255,0.4) !important; }
        [data-theme="light"] .bg-neutral-950\/95 { background-color: rgba(255,255,255,0.95) !important; }
        [data-theme="light"] .bg-neutral-800 { background-color: var(--c-el) !important; }
        [data-theme="light"] .hover\:bg-neutral-700:hover { background-color: var(--c-el-hover) !important; }
        
        [data-theme="light"] .text-white, [data-theme="light"] .text-neutral-100 { color: var(--c-text-main) !important; }
        [data-theme="light"] .text-neutral-300 { color: var(--c-text-sec) !important; }
        [data-theme="light"] .text-neutral-400 { color: var(--c-text-muted) !important; }
        [data-theme="light"] .text-neutral-500, [data-theme="light"] .text-neutral-600 { color: var(--c-text-faint) !important; }
        
        [data-theme="light"] .border-neutral-800 { border-color: var(--c-border) !important; }
        [data-theme="light"] .border-neutral-700 { border-color: #D1D5DB !important; }
        [data-theme="light"] .hover\:border-neutral-700:hover { border-color: #D1D5DB !important; }
        
        [data-theme="light"] .text-amber-500, [data-theme="light"] .text-amber-400 { color: var(--c-accent) !important; }
        [data-theme="light"] .bg-amber-500 { background-color: var(--c-accent) !important; color: var(--c-accent-text) !important; }
        [data-theme="light"] .hover\:bg-amber-400:hover { background-color: var(--c-accent-hover) !important; }
        [data-theme="light"] .border-amber-500 { border-color: var(--c-accent) !important; }
        [data-theme="light"] .text-neutral-950 { color: var(--c-accent-text) !important; }
        
        [data-theme="light"] .border-amber-500\/20 { border-color: rgba(217, 119, 6, 0.2) !important; }
        [data-theme="light"] .border-amber-500\/30 { border-color: rgba(217, 119, 6, 0.3) !important; }
        [data-theme="light"] .bg-amber-500\/10 { background-color: rgba(217, 119, 6, 0.1) !important; }
        [data-theme="light"] .bg-amber-500\/20 { background-color: rgba(217, 119, 6, 0.15) !important; }
        [data-theme="light"] .shadow-amber-500\/20 { box-shadow: 0 10px 15px -3px rgba(217, 119, 6, 0.2), 0 4px 6px -4px rgba(217, 119, 6, 0.2) !important; }
        
        [data-theme="light"] .bg-green-500\/20 { background-color: rgba(34, 197, 94, 0.15) !important; }
        [data-theme="light"] .text-green-400 { color: #15803d !important; }
        [data-theme="light"] .bg-red-950\/20 { background-color: rgba(239, 68, 68, 0.05) !important; }
        [data-theme="light"] .bg-red-950\/30 { background-color: rgba(239, 68, 68, 0.1) !important; }
        [data-theme="light"] .bg-red-950\/40 { background-color: rgba(239, 68, 68, 0.15) !important; }
        [data-theme="light"] .bg-red-950\/50 { background-color: rgba(239, 68, 68, 0.15) !important; }
        [data-theme="light"] .border-red-900\/30 { border-color: rgba(239, 68, 68, 0.2) !important; }
        [data-theme="light"] .text-red-500 { color: #dc2626 !important; }
        [data-theme="light"] .text-red-400 { color: #b91c1c !important; }
        
        [data-theme="light"] input, [data-theme="light"] select { color: var(--c-text-main) !important; }
        [data-theme="light"] input::placeholder { color: var(--c-text-faint) !important; }
    </style>
</head>

        </div>
