<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velizman Kuaför</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        window.lucide = {
            createIcons: () => {},
            Scissors: () => null, Calendar: () => null, Clock: () => null, 
            User: () => null, Phone: () => null, CheckCircle: () => null, 
            Lock: () => null, Edit: () => null, ChevronLeft: () => null, 
            CalendarCheck2: () => null, MessageCircle: () => null, Wallet: () => null
        };
    </script>
</head>
<body class="bg-black text-white m-0 p-0 antialiased">
    <div id="root"></div>
    <script type="text/babel">
        // Lucide React bileşen taklitçileri
        const Scissors = () => <i class="fas fa-scissors"></i>;
        const Calendar = () => <i class="far fa-calendar-alt"></i>;
        const Clock = () => <i class="far fa-clock"></i>;
        const User = () => <i class="far fa-user"></i>;
        const Phone = () => <i class="fas fa-phone-alt"></i>;
        const CheckCircle = () => <i class="far fa-check-circle"></i>;
        const Lock = () => <i class="fas fa-lock"></i>;
        const Edit = () => <i class="far fa-edit"></i>;
        const ChevronLeft = () => <i class="fas fa-chevron-left"></i>;
        const CalendarCheck2 = () => <i class="fas fa-calendar-check"></i>;
        const MessageCircle = () => <i class="fab fa-whatsapp"></i>;
        const Wallet = () => <i class="fas fa-wallet"></i>;

        // === VELİZMAN UYGULAMA KODLARI BAŞLANGICI ===
        function VelizmanApp() {
            const [view, setView] = React.useState('customer');
            const [selectedDate, setSelectedDate] = React.useState('');
            const [selectedTime, setSelectedTime] = React.useState('');
            const [selectedServices, setSelectedServices] = React.useState([]);
            const [name, setName] = React.useState('');
            const [phone, setPhone] = React.useState('');
            const [appointments, setAppointments] = React.useState([]);
            const [prices, setPrices] = React.useState({
                'sac': 200, 'sakal': 100, 'cilt': 150, 'yikama': 50, 'sac_sakal_yikama': 300, 'sac_yikama': 220
            });
            const [editPrices, setEditPrices] = React.useState({});
            const [adminLogin, setAdminLogin] = React.useState({ username: '', password: '' });
            const [isAdminLoggedIn, setIsAdminLoggedIn] = React.useState(false);
            const [errorMessage, setErrorMessage] = React.useState('');
            const [saveSuccess, setSaveSuccess] = React.useState(false);

            const SERVICES = [
                { id: 'sac', label: 'Saç Tıraşı', price: prices.sac },
                { id: 'sakal', label: 'Sakal Tıraşı', price: prices.sakal },
                { id: 'cilt', label: 'Cilt Bakımı', price: prices.cilt },
                { id: 'yikama', label: 'Yıkama', price: prices.yikama },
                { id: 'sac_sakal_yikama', label: 'Saç + Sakal + Yıkama', price: prices.sac_sakal_yikama },
                { id: 'sac_yikama', label: 'Saç + Yıkama', price: prices.sac_yikama }
            ];

            const getNext7Days = () => {
                const days = [];
                const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
                for (let i = 0; i < 7; i++) {
                    const d = new Date();
                    d.setDate(d.getDate() + i);
                    days.push({
                        dateStr: d.toISOString().split('T')[0],
                        label: d.toLocaleDateString('tr-TR', options),
                        isSameWeek: i < 7
                    });
                }
                return days;
            };

            const generateTimeSlots = () => {
                const slots = [];
                for (let h = 9; h <= 20; h++) {
                    slots.push(`${String(h).padStart(2, '0')}:00`);
                    if (h !== 20) slots.push(`${String(h).padStart(2, '0')}:30`);
                }
                return slots;
            };

            const handleServiceToggle = (id) => {
                if (id === 'sac_sakal_yikama' || id === 'sac_yikama') {
                    setSelectedServices([id]);
                } else {
                    const filtered = selectedServices.filter(s => s !== 'sac_sakal_yikama' && s !== 'sac_yikama');
                    if (filtered.includes(id)) {
                        setSelectedServices(filtered.filter(s => s !== id));
                    } else {
                        setSelectedServices([...filtered, id]);
                    }
                }
            };

            const handlePriceChange = (id, value) => {
                setEditPrices({ ...editPrices, [id]: Number(value) });
            };

            const updatePrices = () => {
                setPrices({ ...prices, ...editPrices });
                setSaveSuccess(true);
                setTimeout(() => setSaveSuccess(false), 3000);
            };

            const handleBook = (e) => {
                e.preventDefault();
                if (!selectedDate || !selectedTime || selectedServices.length === 0 || !name || !phone) {
                    setErrorMessage('Lütfen tüm alanları eksiksiz doldurunuz.');
                    return;
                }
                const dayAppsCount = appointments.filter(app => app.date === selectedDate).length;
                if (dayAppsCount >= 10) {
                    setErrorMessage('Seçtiğiniz gün için maksimum randevu kapasitesine ulaşılmıştır. Lütfen başka bir gün seçin.');
                    return;
                }
                const newApp = {
                    id: Date.now().toString(),
                    date: selectedDate,
                    time: selectedTime,
                    services: selectedServices,
                    name,
                    phone
                };
                setAppointments([...appointments, newApp]);
                setSelectedDate('');
                setSelectedTime('');
                setSelectedServices([]);
                setName('');
                setPhone('');
                setErrorMessage('');
                alert('Randevunuz başarıyla alınmıştır!');
            };

            const totalCapacityPercentage = (dateStr) => {
                const count = appointments.filter(app => app.date === dateStr).length;
                return Math.min(count * 10, 100);
            };

            const handleAdminLoginSubmit = (e) => {
                e.preventDefault();
                if (adminLogin.username === 'admin' && adminLogin.password === 'velizman123') {
                    setIsAdminLoggedIn(true);
                    setErrorMessage('');
                } else {
                    setErrorMessage('Hatalı kullanıcı adı veya şifre.');
                }
            };

            return (
                <div class="min-h-screen bg-black text-white font-sans max-w-md mx-auto border-x border-amber-500/20 shadow-2xl flex flex-col pb-12">
                    <header class="p-6 text-center border-b border-amber-500/20 bg-neutral-950/50 sticky top-0 backdrop-blur-md z-10 flex flex-col items-center">
                        <div class="w-12 h-12 rounded-full border-2 border-amber-500 flex items-center justify-center mb-2 bg-black shadow-lg shadow-amber-500/10">
                            <Scissors />
                        </div>
                        <h1 class="text-2xl font-black tracking-wider text-amber-500 font-serif">VELİZMAN</h1>
                        <p class="text-xs text-neutral-400 tracking-widest mt-0.5">Erkek Kuaförü</p>
                        <p class="text-[10px] text-neutral-500 italic mt-1">Berber Coşkun Çulan</p>
                    </header>

                    <div class="flex-1 p-4 space-y-6">
                        {view === 'customer' && (
                            <div class="space-y-6">
                                <section class="bg-neutral-950/60 p-4 rounded-xl border border-amber-500/10">
                                    <div class="flex items-center gap-2 mb-3 border-b border-neutral-900 pb-2">
                                        <Scissors />
                                        <h2 class="text-sm font-bold tracking-wider text-amber-500 uppercase">Hizmetlerimiz</h2>
                                        <span class="text-[10px] text-neutral-500 ml-auto">Güncelleme: 24.05.2026</span>
                                    </div>
                                    <div class="space-y-2">
                                        {SERVICES.map(service => (
                                            <div 
                                                key={service.id} 
                                                onClick={() => handleServiceToggle(service.id)}
                                                class={`flex items-center justify-between p-3 rounded-lg border transition-all cursor-pointer ${selectedServices.includes(service.id) ? 'bg-amber-500/10 border-amber-500 shadow-md shadow-amber-500/5' : 'bg-neutral-900/40 border-neutral-800 hover:border-neutral-700'}`}
                                            >
                                                <span class="text-sm">{service.label}</span>
                                                <span class="text-sm font-bold text-amber-500">{service.price} ₺</span>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <form onSubmit={handleBook} class="space-y-4">
                                    <section class="bg-neutral-950/60 p-4 rounded-xl border border-amber-500/10">
                                        <div class="flex items-center gap-2 mb-3 border-b border-neutral-900 pb-2">
                                            <Calendar />
                                            <h2 class="text-sm font-bold tracking-wider text-amber-500 uppercase">Tarih Seçin</h2>
                                        </div>
                                        <div class="space-y-2 max-h-48 overflow-y-auto pr-1">
                                            {getNext7Days().map(day => {
                                                const pct = totalCapacityPercentage(day.dateStr);
                                                const isFull = pct >= 100;
                                                return (
                                                    <div 
                                                        key={day.dateStr}
                                                        onClick={() => !isFull && setSelectedDate(day.dateStr)}
                                                        class={`p-3 rounded-lg border transition-all flex flex-col gap-1 ${isFull ? 'bg-neutral-900/20 border-red-950 opacity-40 cursor-not-allowed' : selectedDate === day.dateStr ? 'bg-amber-500/10 border-amber-500 shadow-md' : 'bg-neutral-900/40 border-neutral-800 hover:border-neutral-700 cursor-pointer'}`}
                                                    >
                                                        <div class="flex justify-between items-center">
                                                            <span class="text-xs font-medium">{day.label}</span>
                                                            <span class={`text-[10px] font-bold px-1.5 py-0.5 rounded ${isFull ? 'bg-red-500/20 text-red-400' : pct >= 70 ? 'bg-orange-500/20 text-orange-400' : 'bg-emerald-500/20 text-emerald-400'}`}>
                                                                {isFull ? '%100 (Dolu)' : `%${pct} Dolu`}
                                                            </span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </section>

                                    {selectedDate && (
                                        <section class="bg-neutral-950/60 p-4 rounded-xl border border-amber-500/10 transition-all">
                                            <div class="flex items-center gap-2 mb-3 border-b border-neutral-900 pb-2">
                                                <Clock />
                                                <h2 class="text-sm font-bold tracking-wider text-amber-500 uppercase">Saat Seçin</h2>
                                            </div>
                                            <div class="grid grid-cols-4 gap-2">
                                                {generateTimeSlots().map(time => {
                                                    const isTaken = appointments.some(app => app.date === selectedDate && app.time === time);
                                                    return (
                                                        <button
                                                            key={time}
                                                            type="button"
                                                            disabled={isTaken}
                                                            onClick={() => setSelectedTime(time)}
                                                            class={`py-2 rounded text-xs font-bold border transition-all ${isTaken ? 'bg-neutral-900/20 border-neutral-950 text-neutral-600 line-through cursor-not-allowed' : selectedTime === time ? 'bg-amber-500 text-black border-amber-500 font-black' : 'bg-neutral-900/60 border-neutral-800 hover:border-neutral-700 text-neutral-300'}`}
                                                        >
                                                            {time}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </section>
                                    )}

                                    <section class="bg-neutral-950/60 p-4 rounded-xl border border-amber-500/10">
                                        <div class="flex items-center gap-2 mb-3 border-b border-neutral-900 pb-2">
                                            <User />
                                            <h2 class="text-sm font-bold tracking-wider text-amber-500 uppercase">Bilgileriniz</h2>
                                        </div>
                                        <div class="space-y-3">
                                            <div>
                                                <label class="text-[10px] text-neutral-400 uppercase tracking-wider block mb-1">Adınız Soyadınız</label>
                                                <input 
                                                    type="text" 
                                                    value={name}
                                                    onChange={(e) => setName(e.target.value)}
                                                    placeholder="Örn. Ahmet Yılmaz" 
                                                    class="w-full bg-neutral-900 border border-neutral-800 rounded-lg py-2 px-3 text-sm text-white focus:outline-none focus:border-amber-500 transition-all"
                                                />
                                            </div>
                                            <div>
                                                <label class="text-[10px] text-neutral-400 uppercase tracking-wider block mb-1">Telefon Numaranız</label>
                                                <input 
                                                    type="tel" 
                                                    value={phone}
                                                    onChange={(e) => setPhone(e.target.value)}
                                                    placeholder="05xx xxx xx xx" 
                                                    class="w-full bg-neutral-900 border border-neutral-800 rounded-lg py-2 px-3 text-sm text-white focus:outline-none focus:border-amber-500 transition-all"
                                                />
                                            </div>
                                        </div>
                                    </section>

                                    {errorMessage && <p class="text-red-400 text-xs text-center font-semibold bg-red-500/10 py-2 rounded-lg border border-red-500/20">{errorMessage}</p>}

                                    <button 
                                        type="submit"
                                        class="w-full bg-amber-500 hover:bg-amber-600 text-black font-black py-3.5 rounded-xl text-sm tracking-wider shadow-lg shadow-amber-500/10 transition-all uppercase flex items-center justify-center gap-2 cursor-pointer"
                                    >
                                        <CalendarCheck2 />
                                        Randevuyu Onayla
                                    </button>
                                </form>
                            </div>
                        )}

                        {view === 'admin_login' && !isAdminLoggedIn && (
                            <section class="bg-neutral-950/60 p-4 rounded-xl border border-amber-500/10 max-w-sm mx-auto mt-12">
                                <div class="flex items-center gap-2 mb-4 border-b border-neutral-900 pb-2">
                                    <Lock />
                                    <h2 class="text-sm font-bold tracking-wider text-amber-500 uppercase">Yönetici Girişi</h2>
                                </div>
                                <form onSubmit={handleAdminLoginSubmit} class="space-y-4">
                                    <div>
                                        <label class="text-[10px] text-neutral-400 uppercase tracking-wider block mb-1">Kullanıcı Adı</label>
                                        <input 
                                            type="text" 
                                            value={adminLogin.username}
                                            onChange={(e) => setAdminLogin({ ...adminLogin, username: e.target.value })}
                                            placeholder="admin"
                                            class="w-full bg-neutral-900 border border-neutral-800 rounded-lg py-2 px-3 text-sm text-white focus:outline-none focus:border-amber-500"
                                        />
                                    </div>
                                    <div>
                                        <label class="text-[10px] text-neutral-400 uppercase tracking-wider block mb-1">Şifre</label>
                                        <input 
                                            type="password" 
                                            value={adminLogin.password}
                                            onChange={(e) => setAdminLogin({ ...adminLogin, password: e.target.value })}
                                            placeholder="••••••••"
                                            class="w-full bg-neutral-900 border border-neutral-800 rounded-lg py-2 px-3 text-sm text-white focus:outline-none focus:border-amber-500"
                                        />
                                    </div>
                                    {errorMessage && <p class="text-red-400 text-xs font-semibold">{errorMessage}</p>}
                                    <button type="submit" class="w-full bg-amber-500 text-black font-bold py-2.5 rounded-lg text-sm transition-all cursor-pointer">Giriş Yap</button>
                                </form>
                            </section>
                        )}

                        {view === 'admin_dashboard' && isAdminLoggedIn && (
                            <div class="space-y-6">
                                <section class="bg-neutral-950/60 p-4 rounded-xl border border-amber-500/10">
                                    <div class="flex items-center gap-2 mb-4 border-b border-neutral-900 pb-2">
                                        <Edit />
                                        <h2 class="text-sm font-bold tracking-wider text-amber-500 uppercase">Fiyatları Güncelle</h2>
                                    </div>
                                    <div class="space-y-3">
                                        {SERVICES.map(service => (
                                            <div key={service.id} class="flex items-center justify-between gap-2">
                                                <span class="text-xs text-neutral-300">{service.label}</span>
                                                <div class="flex items-center gap-2">
                                                    <input 
                                                        type="number" 
                                                        placeholder={service.price}
                                                        onChange={(e) => handlePriceChange(service.id, e.target.value)}
                                                        class="w-20 bg-neutral-900 border border-neutral-700 rounded-lg py-1.5 px-2 text-right text-white focus:outline-none focus:border-amber-500 font-mono text-xs"
                                                    />
                                                    <span class="text-xs text-amber-500 font-bold">₺</span>
                                                </div>
                                            </div>
                                        ))}
                                        <button 
                                            onClick={updatePrices}
                                            class="w-full bg-amber-500 text-black font-bold py-2 rounded-lg text-xs mt-2 transition-all cursor-pointer"
                                        >
                                            {saveSuccess ? 'Kaydedildi!' : 'Fiyatları Güncelle'}
                                        </button>
                                    </div>
                                </section>

                                <section class="bg-neutral-950/60 p-4 rounded-xl border border-amber-500/10">
                                    <div class="flex items-center gap-2 mb-4 border-b border-neutral-900 pb-2">
                                        <Calendar />
                                        <h2 class="text-sm font-bold tracking-wider text-amber-500 uppercase">Randevu Listesi ({appointments.length})</h2>
                                    </div>
                                    {appointments.length === 0 ? (
                                        <p class="text-xs text-neutral-500 text-center py-4">Henüz alınmış bir randevu bulunmuyor.</p>
                                    ) : (
                                        <div class="space-y-3 max-h-80 overflow-y-auto pr-1">
                                            {appointments.map(app => (
                                                <div key={app.id} class="bg-neutral-900/50 p-3 rounded-lg border border-neutral-800 space-y-1.5">
                                                    <div class="flex justify-between items-center border-b border-neutral-950 pb-1">
                                                        <span class="text-xs font-black text-amber-500">{app.name}</span>
                                                        <span class="text-[10px] font-mono bg-neutral-800 px-1.5 py-0.5 rounded text-neutral-300">{app.time}</span>
                                                    </div>
                                                    <div class="flex flex-wrap gap-1">
                                                        {app.services.map(sId => (
                                                            <span key={sId} class="text-[9px] bg-amber-500/5 text-amber-400 border border-amber-500/10 px-1.5 py-0.5 rounded">
                                                                {SERVICES.find(s => s.id === sId)?.label || sId}
                                                            </span>
                                                        ))}
                                                    </div>
                                                    <div class="text-[10px] text-neutral-400 flex items-center gap-1 pt-0.5">
                                                        <Phone class="w-2.5 h-2.5 text-neutral-500" />
                                                        <span>{app.phone}</span>
                                                        <span class="text-neutral-600 mx-1">|</span>
                                                        <span>{app.date}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </section>
                            </div>
                        )}
                    </div>

                    <footer class="mt-auto border-t border-amber-500/10 bg-neutral-950/80 p-2 fixed bottom-0 left-0 right-0 max-w-md mx-auto backdrop-blur-md flex justify-around text-neutral-400">
                        <button onClick={() => setView('customer')} class={`flex flex-col items-center gap-0.5 py-1 px-3 rounded-lg text-[10px] font-bold tracking-wider transition-all cursor-pointer ${view === 'customer' ? 'text-amber-500' : 'hover:text-neutral-200'}`}>
                            <Calendar /> Randevu Al
                        </button>
                        <button 
                            onClick={() => {
                                if(isAdminLoggedIn) { setView('admin_dashboard'); } 
                                else { setView('admin_login'); }
                            }} 
                            class={`flex flex-col items-center gap-0.5 py-1 px-3 rounded-lg text-[10px] font-bold tracking-wider transition-all cursor-pointer ${view.startsWith('admin') ? 'text-amber-500' : 'hover:text-neutral-200'}`}
                        >
                            <Lock /> {isAdminLoggedIn ? 'Panel' : 'Yönetici'}
                        </button>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<VelizmanApp />);
    </script>
</body>
</html>
